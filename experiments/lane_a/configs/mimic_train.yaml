# meds-torch training config — MIMIC-IV benchmark (Lane A).
#
# Run AFTER running triplet_preproc.yaml on data/MEDS_cohort (see run_lane_a.sh).
#
# Run with:
#   meds-torch-train \
#       --config-dir experiments/lane_a/configs \
#       --config-name mimic_train

defaults:
  - _self_
  - model: eic_model
  - data: pytorch_dataset
  - trainer: default
  - task: binary_classification
  - optimizer: adamw
  - scheduler: cosine_annealing
  - callbacks: default
  - logger: csv

# Data — points to MIMIC preprocessed triplet tensors
MEDS_cohort_dir: data/mimic_triplet_tensors   # generated by triplet_preproc.yaml
task_name: mortality/in_hospital/first_24h    # matches path in data/MEDS_cohort/tasks/

data:
  batch_size: 64                 # MIMIC is large; larger batch amortises shard IO
  max_seq_len: 512
  num_workers: 8

# Same architecture as K-MIMIC for fair comparison
model:
  token_dim: 128
  n_heads: 4
  n_layers: 2
  dropout: 0.1

task:
  positive_weight: auto

trainer:
  max_epochs: 20                 # MIMIC has ~300k patients; fewer epochs usually enough
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  gradient_clip_val: 1.0
  check_val_every_n_epoch: 1
  log_every_n_steps: 50

optimizer:
  lr: 1e-3
  weight_decay: 1e-4

seed: 42

output_dir: experiments/lane_a/results/mimic
